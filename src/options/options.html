<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unicode Sentinel — Options</title>
  <style>
    body { font-family: system-ui; max-width: 560px; margin: 32px auto; padding: 0 16px; }
    label { display: block; margin: 12px 0 4px; font-weight: 600; }
    select, input[type="text"], input[type="number"], textarea { width: 100%; padding: 6px; box-sizing: border-box; }
    .hint { font-size: 12px; color: #666; margin-top: 2px; }
    #save-btn { margin-top: 20px; padding: 8px 20px; cursor: pointer; }
    #saved-msg { display: none; color: green; margin-left: 10px; }
  </style>
</head>
<body>
  <h1>Unicode Sentinel Settings</h1>
  <label for="scan_scope">Scan scope</label>
  <select id="scan_scope">
    <option value="code_blocks">Code blocks only</option>
    <option value="full_page">Full page</option>
  </select>
  <label for="banner_threshold_t3">T3 banner threshold</label>
  <input type="number" id="banner_threshold_t3" min="0" max="100">
  <div class="hint">Minimum T3 findings to trigger banner (0 = always).</div>
  <label for="group_threshold">Group threshold</label>
  <input type="number" id="group_threshold" min="1" max="100">
  <div class="hint">Consecutive invisible chars before collapsing into group marker.</div>
  <label><input type="checkbox" id="inline_markers_enabled"> Show inline markers</label>
  <label><input type="checkbox" id="export_redact_urls"> Redact URLs in exports</label>
  <label><input type="checkbox" id="export_strip_context"> Strip context from exports</label>
  <label for="signature_ruleset_url">External signature ruleset URL <em>(not yet implemented)</em></label>
  <input type="text" id="signature_ruleset_url" placeholder="https://...">
  <button id="save-btn">Save</button>
  <span id="saved-msg">Saved!</span>
  <script src="src/options/options.js"></script>
</body>
</html>
