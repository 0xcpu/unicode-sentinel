<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unicode Sentinel</title>
  <style>
    body { font-family: system-ui; width: 380px; padding: 12px; margin: 0; }
    #status { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .red { background: #dc2626; } .amber { background: #f59e0b; } .green { background: #22c55e; }
    #findings-list { max-height: 240px; overflow-y: auto; font-size: 12px; margin-top: 8px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 3px 5px; border-bottom: 1px solid #eee; }
    th { background: #f5f5f5; font-size: 11px; }
    #controls { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    button { font-size: 12px; padding: 4px 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="status"><div id="dot" class="dot green"></div><span id="status-text">Ready.</span></div>

  <div id="scan-empty" style="display:none">
    <p style="font-size:13px;color:#555;margin:10px 0 8px">Click to scan this page for invisible Unicode characters.</p>
    <button id="scan-btn" style="font-size:13px;padding:6px 14px;cursor:pointer">Scan this page</button>
  </div>

  <div id="scanning" style="display:none">
    <span id="scanning-spinner" style="font-size:13px;color:#555">Scanning…</span>
  </div>

  <div id="scanned" style="display:none">
    <div id="tier-counts" style="font-size:13px;color:#555"></div>
    <div id="sig-matches"></div>
    <div id="findings-list"></div>
    <div id="controls">
      <button id="rescan-btn">Rescan this page</button>
      <button id="btn-toggle">Toggle markers</button>
      <button id="btn-export">Export report</button>
    </div>
  </div>

  <div id="scan-failed" style="display:none">
    <p style="font-size:13px;color:#b45309;margin:10px 0 8px">Scan didn't finish. Try again?</p>
    <button id="retry-btn" style="font-size:13px;padding:6px 14px;cursor:pointer">Scan this page</button>
  </div>

  <script src="src/popup/popup.js"></script>
</body>
</html>
